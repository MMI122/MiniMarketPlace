<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section>
    <div class="mb-4">
        <h2>My Order History</h2>
    </div>

    <div th:if="${param.success}" class="alert alert-success">
        Order placed successfully!
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Date</th>
                    <th>Product</th>
                    <th>Seller</th>
                    <th>Quantity</th>
                    <th>Total Price</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${#temporals.format(order.orderDate, 'MMM dd, yyyy HH:mm')}">Date</td>
                    <td th:text="${order.product.name}">Product</td>
                    <td th:text="${order.product.seller.username}">Seller</td>
                    <td th:text="${order.quantity}">1</td>
                    <td class="text-success fw-bold" th:text="'$' + ${order.totalPrice}">$0.00</td>
                </tr>
                <tr th:if="${#lists.isEmpty(orders)}">
                    <td colspan="5" class="text-center text-muted py-4">You haven't placed any orders yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</html>
