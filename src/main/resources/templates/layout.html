<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Mini Marketplace</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" href="/products">Browse Marketplace</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ROLE_BUYER'')')}">
                    <a class="nav-link text-white" href="/orders">My Orders</a>
                </li>
                <li class="nav-item" th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')')}">
                    <a class="nav-link text-warning fw-bold" href="/admin/dashboard">⚙️ Admin Dashboard</a>
                </li>
            </ul>
        </div>

        <div class="d-flex">
            <a th:if="${#authorization.expression('isAnonymous()')}" class="btn btn-outline-light me-2" href="/login">Login</a>
            <a th:if="${#authorization.expression('isAnonymous()')}" class="btn btn-light" href="/register">Register</a>

            <form th:if="${#authorization.expression('isAuthenticated()')}" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-danger">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div th:replace="${content}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
