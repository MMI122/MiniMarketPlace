<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">List a New Product</h3>

                    <form th:action="@{/products/add}" th:object="${product}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Product Name</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="price" class="form-label fw-bold">Price ($)</label>
                            <input type="number" step="0.01" min="0" id="price" th:field="*{price}" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold">Description</label>
                            <textarea id="description" th:field="*{description}" class="form-control" rows="4" placeholder="Describe your item..."></textarea>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">List Product</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</section>
</html>
