<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section>
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card shadow-sm rounded-4 border-0">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4 fw-bold" th:text="${productId != null} ? 'Update Product' : 'List a New Product'">List a New Product</h3>

                    <form th:action="${productId != null} ? @{/products/edit/{id}(id=${productId})} : @{/products/add}" th:object="${product}" method="post">

                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Product Name</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="price" class="form-label fw-bold">Price ($)</label>
                            <input type="number" step="0.01" min="0" id="price" th:field="*{price}" class="form-control" required>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold">Description</label>
                            <textarea id="description" th:field="*{description}" class="form-control" rows="3" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2" th:text="${productId != null} ? 'Update Product' : 'Add Product'">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
