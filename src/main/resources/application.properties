spring.application.name=MIniMarketPlacePrototype

# ========================
# Database Configuration
# ========================
# Values come from environment variables (Docker/Render)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/minimarket}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:appuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:apppass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Thymeleaf
# ========================
spring.thymeleaf.cache=false

# ========================
# Spring Security
# ========================
# Disable default security auto-config password logging
logging.level.org.springframework.security=INFO

# ========================
# Server
# ========================
server.port=${PORT:8080}
